<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      var savedLanguage = localStorage.getItem('language');
      var browserLang = navigator.language || navigator.userLanguage;
      var lang = savedLanguage || (browserLang && browserLang.startsWith('ja') ? 'ja' : 'ko');
      document.documentElement.lang = lang;

      // Dynamic Manifest Loading (Initial)
      var manifestFile = 'manifest_ko.json';
      if (lang === 'ja') manifestFile = 'manifest_ja.json';
      else if (lang === 'en') manifestFile = 'manifest_en.json';

      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestFile;
      document.head.appendChild(link);

      // Initial Apple Title
      var titleMap = { ko: '프로세카 계산기', ja: 'プロセカ計算機', en: 'Prsk Calc' };
      var appTitle = titleMap[lang] || titleMap.ko;
      document.title = appTitle;
      var meta = document.createElement('meta');
      meta.name = 'apple-mobile-web-app-title';
      meta.content = appTitle;
      document.head.appendChild(meta);
    })();
  </script>
  <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icon.png" />
  <link rel="shortcut icon" href="%PUBLIC_URL%/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Project Sekai Calculator" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon2.png" />


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=block"
    rel="stylesheet">
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
